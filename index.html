<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main>
      <section class="card-container">
        <article class="user-card border-radius">
          <div class="user-img-and-name border-radius">
            <img
              src="./images/image-jeremy.png"
              alt="Jeremy"
              class="user-img"
            />
            <div class="user-name">
              <span>Report for</span>
              <span class="user-card__name">Jeremy Robson</span>
            </div>
          </div>

          <div class="user-card__filter">
            <span class="filter">Daily</span>
            <span class="filter">Weekly</span>
            <span class="filter">Monthly</span>
          </div>
        </article>

        <article class="productivity-card">
          <div class="productivity-card__pic border-radius">
            <svg>
              <path
                xmlns="http://www.w3.org/2000/svg"
                d="m18.687 10.43 15.464 30.906c.31.682.743 1.322 1.3 1.88.558.557 1.198.99 1.714 1.217L68.237 59.98 52.484 75.732a8.025 8.025 0 0 1-11.355 0L2.934 37.538a8.025 8.025 0 0 1 0-11.356L18.687 10.43Zm19.345-7.99 10.839 10.838 2.065-2.064a5.845 5.845 0 0 1 8.258 0l8.258 8.259a5.845 5.845 0 0 1 0 8.258l-2.064 2.064 10.839 10.84a8.025 8.025 0 0 1 0 11.355l-4.728 4.728L39.126 40.53a1.963 1.963 0 0 1-.578-.413 1.963 1.963 0 0 1-.413-.578L21.95 7.168l4.728-4.728a8.025 8.025 0 0 1 11.355 0Zm17.033 12.903-2.064 2.065 8.258 8.258 2.064-2.064-8.258-8.259Z"
                fill="#D96C47"
                fill-rule="nonzero"
              />
            </svg>

            <div class="productivity-card__content border-radius">
              <span class="productivity-card__title">Work</span>
              <img src="./images/icon-ellipsis.svg" class="menu" />
              <span class="productivity-card__current">5hrs</span>
              <span class="productivity-card__previous">Last Week - 7hrs</span>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Farha Shaikh</a>.
    </footer>
  </body>
</html>
