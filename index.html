<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main>
      <section class="card-container">
        <article class="user-card border-radius">
          <div class="user-img-and-name border-radius">
            <img
              src="./images/image-jeremy.png"
              alt="Jeremy"
              class="user-img"
            />
            <div class="user-name">
              <span>Report for</span>
              <span class="user-card__name">Jeremy Robson</span>
            </div>
          </div>

          <div class="user-card__filter">
            <span class="filter">Daily</span>
            <span class="filter">Weekly</span>
            <span class="filter">Monthly</span>
          </div>
        </article>

        <article class="productivity-card">
          <span class="productivity-card__title">Work</span>

          <span class="productivity-card__current">5hrs</span>
          <span class="productivity-card__previous">Previous - 7hrs</span>
        </article>
      </section>
    </main>

    <footer>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Farha Shaikh</a>.
    </footer>
  </body>
</html>
